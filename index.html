<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSN 케어</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root{--p:#2563eb;--pl:#dbeafe;--pd:#1d4ed8;--ok:#10b981;--okl:#d1fae5;--w:#f59e0b;--wl:#fef3c7;--e:#ef4444;--el:#fee2e2;--g0:#fff;--g50:#f9fafb;--g1:#f3f4f6;--g2:#e5e7eb;--g3:#d1d5db;--g4:#9ca3af;--g5:#6b7280;--g7:#374151;--g8:#1f2937;--g9:#111827;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#f0f2f5;color:var(--g8);display:flex;min-height:100vh;font-size:16px;line-height:1.7;}
.sidebar{width:72px;background:var(--g9);position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:4px;}
.si{width:54px;height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;color:var(--g4);font-size:11px;gap:3px;text-decoration:none;transition:all .15s;}
.si:hover{background:rgba(255,255,255,.1);color:#fff;}.si.active{background:var(--p);color:#fff;}.si .ico{font-size:22px;}
.sdiv{width:36px;height:1px;background:#374151;margin:4px 0;}
.main{flex:1;margin-left:72px;min-height:100vh;}
.topbar{height:56px;background:var(--g0);border-bottom:1px solid var(--g2);display:flex;align-items:center;padding:0 24px;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar h1{font-size:18px;font-weight:800;}
.ct{padding:24px;}.page{display:none;}.page.active{display:block;}
.card{background:var(--g0);border:1px solid var(--g2);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.card-h{padding:16px 22px;border-bottom:1px solid var(--g1);display:flex;justify-content:space-between;align-items:center;}
.card-h h3{font-size:18px;font-weight:700;}.card-b{padding:20px 22px;}.card-b.np{padding:0;}
.tbl{width:100%;border-collapse:collapse;}.tbl th{padding:14px 18px;text-align:left;font-weight:600;color:var(--g5);background:var(--g50);border-bottom:1px solid var(--g2);font-size:14px;}
.tbl td{padding:14px 18px;border-bottom:1px solid var(--g1);font-size:16px;}.tbl tr:hover td{background:var(--g50);}.tbl .r{text-align:right;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.badge{display:inline-flex;padding:5px 12px;border-radius:6px;font-size:14px;font-weight:600;}
.bg{background:var(--okl);color:#065f46;}.br{background:var(--el);color:#991b1b;}.by{background:var(--wl);color:#92400e;}.bb{background:var(--pl);color:var(--pd);}.bgr{background:var(--g1);color:#4b5563;}
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-p{background:var(--p);color:#fff;}.btn-p:hover{background:var(--pd);}.btn-o{background:var(--g0);color:var(--g7);border:1px solid var(--g3);}
.btn-sm{padding:7px 14px;font-size:14px;}
.fi,.fs{padding:11px 14px;border:1px solid var(--g3);border-radius:8px;font-size:16px;font-family:inherit;outline:none;width:100%;}.fi:focus,.fs:focus{border-color:var(--p);}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--g2);border-radius:10px;overflow:hidden;}
.cal-hd{background:var(--g50);padding:10px;text-align:center;font-size:15px;font-weight:700;color:var(--g5);}.cal-hd.sun{color:var(--e);}
.cal-c{background:var(--g0);min-height:110px;padding:8px;cursor:pointer;position:relative;}.cal-c:hover{background:#f0f4ff;}.cal-c.today{background:#eff6ff;box-shadow:inset 0 0 0 2px var(--p);}.cal-c.other{background:var(--g50);color:var(--g4);}
.cal-day{font-weight:700;font-size:17px;margin-bottom:4px;}.cal-day.sun{color:var(--e);}
.cal-ev{font-size:12px;padding:3px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.cal-ev.work{background:var(--pl);color:var(--pd);}.cal-ev.contract{background:var(--wl);color:#92400e;}.cal-ev.all{background:var(--g1);color:#4b5563;}
.cal-add{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:var(--p);color:#fff;font-size:18px;display:none;align-items:center;justify-content:center;cursor:pointer;}
.cal-c:hover .cal-add{display:flex;}
.urg-item{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--g1);cursor:pointer;}.urg-item:hover{background:#fff5f5;}.urg-item:last-child{border-bottom:none;}
.urg-dot{width:10px;height:10px;border-radius:50%;background:var(--e);flex-shrink:0;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.bld-card{display:flex;gap:16px;padding:20px 22px;border-bottom:1px solid var(--g1);cursor:pointer;align-items:center;}.bld-card:hover{background:var(--g50);}
.bld-thumb{width:72px;height:72px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:800;flex-shrink:0;}
.owner-box{background:var(--g50);border-radius:12px;padding:22px;margin-bottom:18px;}
.owner-box h4{font-size:18px;font-weight:700;margin-bottom:12px;}
.owner-row{display:flex;gap:30px;flex-wrap:wrap;font-size:15px;}.owner-item .ol{font-size:13px;color:var(--g5);}.owner-item .ov{font-weight:700;font-size:17px;margin-top:2px;}
.note-item{display:flex;gap:12px;padding:14px 18px;border-bottom:1px solid var(--g1);}.note-item:last-child{border-bottom:none;}
.note-date{width:70px;color:var(--g5);font-weight:600;flex-shrink:0;}.note-text{flex:1;}
.drv-folder{display:flex;align-items:center;gap:10px;padding:14px 18px;border:1px solid var(--g2);border-radius:10px;margin-bottom:8px;cursor:pointer;font-size:16px;}.drv-folder:hover{border-color:var(--p);background:var(--pl);}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.file-item{border:1px solid var(--g2);border-radius:8px;padding:14px;text-align:center;cursor:pointer;}.file-item:hover{border-color:var(--p);}
.rpt-form{border:1px solid var(--g2);border-radius:10px;overflow:hidden;}
.rpt-header{background:#1e3a5f;color:#fff;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;}
.rpt-header .rh-left{font-weight:700;font-size:17px;}.rpt-header .rh-right{font-weight:800;font-size:16px;}
.rpt-section{padding:18px 22px;border-bottom:1px solid var(--g2);}
.rpt-section h4{font-size:16px;font-weight:700;color:#1e3a5f;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1e3a5f;display:inline-block;}
.rpt-field{display:flex;border-bottom:1px solid var(--g2);}.rpt-field:last-child{border-bottom:none;}
.rpt-label{width:120px;padding:10px 14px;background:var(--g50);font-weight:600;font-size:14px;border-right:1px solid var(--g2);flex-shrink:0;}
.rpt-value{flex:1;padding:10px 14px;font-size:15px;}
.rpt-value input,.rpt-value textarea{width:100%;border:none;outline:none;font-size:15px;font-family:inherit;background:transparent;resize:vertical;}
.mbg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.mbg.open{display:flex;}.mbox{background:var(--g0);border-radius:16px;max-width:800px;width:94%;max-height:85vh;overflow-y:auto;padding:28px;}
.mbox h3{font-size:19px;font-weight:800;margin-bottom:16px;}.mclose{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--g5);}
#login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--g9);z-index:999;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--g0);border-radius:16px;padding:40px;width:360px;text-align:center;}
@media print{.sidebar,.topbar,#login-screen{display:none!important;}.main{margin-left:0!important;}}
@media(max-width:768px){.sidebar{width:52px;}.main{margin-left:52px;}.ct{padding:12px;}.grid-2{grid-template-columns:1fr;}.cal-c{min-height:60px;}.cal-ev{display:none;}}
</style>
</head>
<body>

<div id="login-screen"><div class="login-box">
<div style="font-size:28px;font-weight:800;color:var(--p);margin-bottom:4px;">BSN CARE</div>
<div style="font-size:15px;color:var(--g5);margin-bottom:28px;">빌딩관리 시스템</div>
<div style="margin-bottom:14px;text-align:left;"><input id="login-id" class="fi" placeholder="아이디" onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus();"></div>
<div style="margin-bottom:16px;text-align:left;"><input id="login-pw" type="password" class="fi" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin();"></div>
<div style="margin-bottom:18px;text-align:left;"><label style="cursor:pointer;display:flex;align-items:center;gap:8px;font-size:15px;"><input type="checkbox" id="login-auto" style="width:18px;height:18px;"> 자동 로그인</label></div>
<button class="btn btn-p" style="width:100%;padding:14px;font-size:17px;" onclick="doLogin()">로그인</button>
<div id="login-err" style="color:var(--e);font-size:14px;margin-top:12px;display:none;">아이디 또는 비밀번호가 틀렸습니다</div>
</div></div>

<nav class="sidebar" style="display:none;" id="nav-sidebar">
<a class="si active" onclick="SP('schedule')"><span class="ico">📅</span>일정</a>
<a class="si" onclick="SP('buildings')"><span class="ico">🏢</span>건물</a>
<a class="si" onclick="SP('expirations')"><span class="ico">⏰</span>만료</a>
<a class="si" onclick="SP('billing')"><span class="ico">🧾</span>정산</a>
<div class="sdiv"></div>
<a class="si" onclick="SP('report')"><span class="ico">📝</span>리포트</a>
<a class="si" onclick="SP('drive')"><span class="ico">☁️</span>드라이브</a>
<a class="si" onclick="SP('chatbot')"><span class="ico">💬</span>AI</a>
</nav>

<div class="main" style="display:none;" id="main-content">
<div class="topbar"><h1 id="pt">📅 일정관리</h1><div style="display:flex;gap:12px;align-items:center;font-size:15px;"><span id="top-info"></span></div></div>
<div class="ct">

<section id="pg-schedule" class="page active">
<div style="display:flex;gap:16px;">
<!-- 좌측: 건물 리스트 -->
<div class="card" style="width:220px;flex-shrink:0;max-height:calc(100vh - 150px);overflow-y:auto;">
<div class="card-h"><h3 style="font-size:15px;">🏢 건물</h3></div>
<div class="card-b np">
<div class="sch-bld-item" data-id="all" onclick="schBldF('all')" style="padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--g1);font-weight:700;background:var(--pl);">📅 전체 일정</div>
<div id="sch-bld-list"></div>
</div></div>
<!-- 우측: 캘린더 + 긴급 -->
<div style="flex:1;">
<div style="display:flex;gap:8px;margin-bottom:12px;"><button class="btn btn-sm btn-p" id="sf-all" onclick="schF('all')">전체</button><button class="btn btn-sm btn-o" id="sf-mine" onclick="schF('mine')">내 일정</button></div>
<div class="card"><div class="card-h"><h3 id="cal-title">2026년 3월</h3><div style="display:flex;gap:8px;"><button class="btn btn-o btn-sm" onclick="calM(-1)">◀</button><button class="btn btn-o btn-sm" onclick="calM(1)">▶</button></div></div><div style="padding:10px;"><div id="cal"></div></div></div>
<div class="card" style="border-color:var(--e);border-width:2px;"><div class="card-h" style="background:#fff5f5;"><h3 style="color:var(--e);">🚨 긴급 처리 <span id="urg-cnt"></span></h3></div><div class="card-b np" id="ds-urg"></div></div>
</div>
</div>
</section>

<section id="pg-buildings" class="page">
<div style="display:flex;gap:8px;margin-bottom:14px;"><button class="btn btn-sm btn-p" id="bf-all" onclick="bldF('all')">전체</button><button class="btn btn-sm btn-o" id="bf-전원성" onclick="bldF('전원성')">전원성</button><button class="btn btn-sm btn-o" id="bf-장승원" onclick="bldF('장승원')">장승원</button></div>
<div class="card"><div class="card-b np" id="blist"></div></div></section>

<section id="pg-detail" class="page"><div style="display:flex;gap:8px;margin-bottom:12px;"><button class="btn btn-o btn-sm" onclick="SP('buildings')">← 목록</button><button class="btn btn-o btn-sm" onclick="window.print()">🖨️ 프린트</button></div><div id="det"></div></section>

<section id="pg-expirations" class="page">
<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;">
<button class="btn btn-sm btn-p" id="ef-all" onclick="expF('all')">전체</button>
<button class="btn btn-sm btn-o" id="ef-soon" onclick="expF('soon')">⚠️ 임박 (1개월)</button>
<button class="btn btn-sm btn-o" id="ef-over" onclick="expF('over')">🔴 만료</button>
<input class="fi" id="exp-search" placeholder="🔍 건물명" oninput="renderExp()" style="max-width:220px;margin-left:auto;">
</div>
<div class="card"><div class="card-h"><h3>⏰ 전체 만료 관리</h3><button class="btn btn-p btn-sm" onclick="addExpModal()">+ 추가</button></div><div class="card-b np" id="exp-list"></div></div>
</section>

<section id="pg-billing" class="page">
<div style="margin-bottom:14px;"><input class="fi" id="bill-search" placeholder="🔍 건물명 검색" oninput="filterBill()" style="max-width:300px;"></div>
<div id="bill-list"></div><div id="bill-detail"></div></section>

<section id="pg-report" class="page">
<div class="grid-2">
<div><div class="card"><div class="card-h"><h3>📝 보고서</h3><button class="btn btn-p btn-sm" onclick="genRptForm()">🤖 AI 생성</button></div><div class="card-b">
<div style="margin-bottom:12px;"><input class="fi" id="rpt-search" placeholder="🔍 건물 검색" oninput="filterRpt()"></div>
<div id="rpt-bld-list" style="max-height:200px;overflow-y:auto;border:1px solid var(--g2);border-radius:8px;"></div>
<div style="margin-top:12px;"><select class="fs" id="rpt-mon"><option>2026년 3월</option><option>2026년 2월</option></select></div>
</div></div></div>
<div><div class="card" style="min-height:600px;"><div class="card-h"><h3>미리보기</h3><div style="display:flex;gap:6px;"><button class="btn btn-o btn-sm" onclick="window.print()">📥 PDF/프린트</button><button class="btn btn-p btn-sm" onclick="alert('건물주 전송')">📨 전송</button></div></div><div class="card-b" id="rpt-out"><div style="text-align:center;padding:60px;color:var(--g4);font-size:17px;">건물 선택 후 AI 생성</div></div></div></div>
</div></section>

<section id="pg-drive" class="page">
<div style="margin-bottom:14px;"><input class="fi" id="drv-search" placeholder="🔍 서류 검색 (예: 계약서, 소방, 건축물대장)" oninput="searchDrv()" style="max-width:400px;"></div>
<div id="drv-search-result"></div>
<div class="grid-2" style="grid-template-columns:250px 1fr;">
<div class="card"><div class="card-h"><h3>📂 건물</h3></div><div class="card-b np" id="drv-tree"></div></div>
<div class="card"><div class="card-h"><h3 id="drv-title">폴더 선택</h3></div><div class="card-b" id="drv-files"><div style="text-align:center;padding:50px;color:var(--g4);">📁 건물 선택</div></div></div></div></section>

<section id="pg-chatbot" class="page">
<div class="card" style="display:flex;flex-direction:column;height:calc(100vh - 110px);">
<div style="padding:14px 20px;border-bottom:1px solid var(--g2);font-weight:700;font-size:17px;">🤖 BSN AI</div>
<div style="flex:1;overflow-y:auto;padding:16px;" id="ch-msgs"></div>
<div style="padding:12px 16px;border-top:1px solid var(--g2);display:flex;gap:8px;"><input class="fi" id="ch-in" placeholder="질문..." onkeydown="if(event.key==='Enter')chSend();"><button class="btn btn-p" onclick="chSend()">전송</button></div></div></section>

</div></div>

<div class="mbg" id="mdl" onclick="if(event.target===this)this.classList.remove('open')"><div class="mbox"><button class="mclose" onclick="document.getElementById('mdl').classList.remove('open')">✕</button><div id="mdl-body"></div></div></div>

function updateRptCap(id,idx,val){var b;B.forEach(function(x){if(x.id===id)b=x;});if(!b||!b.rptPhotos||!b.rptPhotos[idx])return;b.rptPhotos[idx].cap=val;}
